# spack/classes/base/compilers.yaml
#
# This file is initially a placeholder. It is populated by running:
#   spack compiler find
# with PrgEnv-amd active on a login node during bootstrap.
#
# The stack_env_install Ansible role writes the discovered compiler entries
# here and commits the result. Do not hand-edit version numbers or paths —
# let `spack compiler find` discover them from the active modules.
#
# A gcc@system entry is required for Spack's own bootstrap dependencies even
# though the stack itself is built with PrgEnv-amd. Spack uses it only for
# internal tools (cmake, python, etc.) — never for stack packages.
#
# Example entries (actual versions filled in at bootstrap time):
#
# compilers:
#   - compiler:
#       spec: gcc@12.x.x
#       paths:
#         cc: /usr/bin/gcc
#         cxx: /usr/bin/g++
#         f77: /usr/bin/gfortran
#         fc: /usr/bin/gfortran
#       flags: {}
#       operating_system: sles15
#       target: x86_64
#       modules: []
#       environment: {}
#       extra_rpaths: []
#
#   - compiler:
#       spec: cce@18.x.x
#       paths:
#         cc: /opt/cray/pe/cce/18.x.x/bin/craycc
#         cxx: /opt/cray/pe/cce/18.x.x/bin/crayCC
#         f77: /opt/cray/pe/cce/18.x.x/bin/crayftn
#         fc: /opt/cray/pe/cce/18.x.x/bin/crayftn
#       flags: {}
#       operating_system: sles15
#       target: x86_64
#       modules:
#         - PrgEnv-cray
#         - cce/18.x.x
#       environment: {}
#       extra_rpaths: []

compilers: []
