# spack/classes/base/packages.yaml
#
# OS-provided system library externals. These are populated by running:
#   spack external find openssl zlib m4 git perl pkgconf libtool autoconf automake
# during the bootstrap Step 3.
#
# Philosophy: only pin packages here that (a) receive frequent OS-level security
# patches (openssl, zlib) or (b) are pure build utilities with no ABI impact and
# no version-sensitivity (m4, git, perl, pkgconf, libtool, autoconf, automake).
# Pinning these means an OS security patch is picked up automatically without
# requiring a full Spack rebuild.
#
# cmake is intentionally NOT listed here — system cmake on Cray/RHEL nodes is
# often too old for newer Spack packages. Leave it buildable so Spack can pull
# in a newer version when a package requires it.
#
# Do NOT include MPI, compilers, BLAS, HDF5, ROCm, or any CPE-provided package
# here. Those belong in classes/cray-amd/packages.yaml and
# systems/${SYSTEM_NAME}/packages.yaml (generated by clusterinspector).

packages:
  # ---- Security-sensitive: track OS patches automatically ----

  openssl:
    buildable: false
    externals:
      - spec: openssl@<VERSION>
        prefix: /usr

  zlib:
    buildable: false
    externals:
      - spec: zlib@<VERSION>
        prefix: /usr

  zlib-ng:
    buildable: true   # let Spack build this — not always OS-provided

  # ---- Pure build utilities: stable, no ABI concerns ----

  m4:
    buildable: false
    externals:
      - spec: m4@<VERSION>
        prefix: /usr

  git:
    buildable: false
    externals:
      - spec: git@<VERSION>
        prefix: /usr

  perl:
    buildable: false
    externals:
      - spec: perl@<VERSION>
        prefix: /usr

  pkgconf:
    buildable: false
    externals:
      - spec: pkgconf@<VERSION>
        prefix: /usr

  libtool:
    buildable: false
    externals:
      - spec: libtool@<VERSION>
        prefix: /usr

  autoconf:
    buildable: false
    externals:
      - spec: autoconf@<VERSION>
        prefix: /usr

  automake:
    buildable: false
    externals:
      - spec: automake@<VERSION>
        prefix: /usr

  tar:
    buildable: false
    externals:
      - spec: tar@<VERSION>
        prefix: /usr

  diffutils:
    buildable: false
    externals:
      - spec: diffutils@<VERSION>
        prefix: /usr

  # ---- cmake: buildable — system version often too old on Cray/RHEL ----

  cmake:
    buildable: true
