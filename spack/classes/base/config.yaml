config:
  install_tree:
    root: <SITE_STACK_ROOT>/gpu-stack/opt/spack
    padded_length: 128   # stable paths for binary relocatability

  build_stage:
    - <SITE_STACK_ROOT>/build-stage/$user/$spack

  module_roots:
    lmod: <SITE_STACK_ROOT>/modules/lmod

  shared_linking:
    type: rpath
    bind: false

  build_jobs: 16

  # Never bootstrap compilers — on Cray all compilers come from PrgEnv modules
  install_missing_compilers: false

  connect_timeout: 30

  # Prevent Spack from modifying the user's shell config files
  suppress_gpg_warnings: true
