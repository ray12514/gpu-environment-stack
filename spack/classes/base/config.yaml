config:
  install_tree:
    root: <SITE_STACK_ROOT>/gpu-stack/opt/spack
    padded_length: 128   # stable paths for binary relocatability

  build_stage:
    - <SITE_STACK_ROOT>/build-stage/$user/$spack

  shared_linking:
    type: rpath
    bind: false

  build_jobs: 16

  # Never bootstrap compilers — on Cray all compilers come from PrgEnv modules
  install_missing_compilers: false

  connect_timeout: 30

  # Note: `module_roots` is not a valid config.yaml key — module roots belong in
  # modules.yaml under modules: default: roots: lmod: ...  (already set there).
  #
  # Note: `suppress_gpg_warnings` was removed in Spack 1.x.
