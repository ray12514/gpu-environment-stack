# spack/systems/lodger/packages.yaml
#
# System-specific external versions for lodger (cray-amd / MI250X / gfx90a).
# This file is auto-generated by scripts/detect-externals.sh and committed
# after operator review.
#
# Run detection with PrgEnv-amd loaded:
#   module load PrgEnv-amd rocm
#   ./scripts/detect-externals.sh
#
# amdgpu_target: gfx90a (MI250X) — confirmed by rocminfo
# Last updated: <DATE> — replace with detection date

packages:

  # ---- Category A: Always external ----

  hip:
    buildable: false
    externals:
      - spec: hip@<ROCM_VERSION>
        modules:
          - rocm/<ROCM_VERSION>

  rocm-opencl-runtime:
    buildable: false
    externals:
      - spec: rocm-opencl-runtime@<ROCM_VERSION>
        modules:
          - rocm/<ROCM_VERSION>

  rocm-smi-lib:
    buildable: false
    externals:
      - spec: rocm-smi-lib@<ROCM_VERSION>
        modules:
          - rocm/<ROCM_VERSION>

  cray-mpich:
    buildable: false
    externals:
      - spec: cray-mpich@<MPICH_VERSION> +gtl
        modules:
          - cray-mpich/<MPICH_VERSION>

  cray-pals:
    buildable: false
    externals:
      - spec: cray-pals@<PALS_VERSION>
        modules:
          - cray-pals/<PALS_VERSION>

  # ---- Category B: External on Cray ----

  cray-libsci:
    buildable: false
    externals:
      - spec: cray-libsci@<LIBSCI_VERSION>
        modules:
          - cray-libsci/<LIBSCI_VERSION>

  hdf5:
    buildable: false
    externals:
      - spec: hdf5@<HDF5_VERSION> +mpi +hl
        modules:
          - cray-hdf5-parallel/<HDF5_VERSION>

  fftw:
    buildable: false
    externals:
      - spec: fftw@<FFTW_VERSION> +mpi
        modules:
          - cray-fftw/<FFTW_VERSION>

  netcdf-c:
    buildable: false
    externals:
      - spec: netcdf-c@<NETCDF_VERSION> +mpi
        modules:
          - cray-netcdf-hdf5parallel/<NETCDF_VERSION>

  python:
    buildable: false
    externals:
      - spec: python@<PYTHON_VERSION>
        modules:
          - cray-python/<PYTHON_VERSION>
