---
# ansible/bootstrap.yml
# First-time bootstrap playbook. Runs all four roles in sequence.
# Use this once to stand up a new system. Subsequent deployments use site.yml.
#
# Usage:
#   ansible-playbook -i ansible/inventory/lodger ansible/bootstrap.yml
#
# Prerequisites: see scripts/bootstrap-runbook.md

- name: Bootstrap gpu-stack on {{ inventory_hostname }}
  hosts: all
  gather_facts: true

  roles:
    - role: spack_install
      tags: [spack_install, bootstrap]

    - role: stack_env_install
      tags: [stack_env_install, bootstrap]

    - role: stack_wrappers
      tags: [stack_wrappers, bootstrap]

    - role: stack_validate
      tags: [stack_validate, bootstrap]
