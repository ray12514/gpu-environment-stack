---
# T1: GPU-buffer MPI correctness via OSU Micro-Benchmarks (2-node, device buffers).

- name: Find OSU osu_bw binary
  ansible.builtin.find:
    paths: "{{ osu_prefix }}"
    patterns: "osu_bw"
    recurse: true
  register: osu_bw_find
  failed_when: osu_bw_find.matched == 0

- name: Set osu_bw path fact
  ansible.builtin.set_fact:
    osu_bw_bin: "{{ osu_bw_find.files[0].path }}"

- name: Find OSU osu_latency binary
  ansible.builtin.find:
    paths: "{{ osu_prefix }}"
    patterns: "osu_latency"
    recurse: true
  register: osu_lat_find
  failed_when: osu_lat_find.matched == 0

- name: Set osu_latency path fact
  ansible.builtin.set_fact:
    osu_lat_bin: "{{ osu_lat_find.files[0].path }}"

- name: Template T1 PBS job script
  ansible.builtin.template:
    src: t1_osu_job.sh.j2
    dest: "{{ validate_evidence_dir }}/t1_osu_job.sh"
    mode: "0755"

- name: Submit T1 OSU MPI job (2-node, GPU-buffer)
  ansible.builtin.command:
    cmd: >
      qsub -W block=true
           -l select={{ validate_node_count }}:ncpus={{ cpus_per_node }}:ngpus={{ gpus_per_node }}
           -q {{ pbs_queue }}
           {{ validate_evidence_dir }}/t1_osu_job.sh
  register: t1_submit
  failed_when: t1_submit.rc != 0

- name: Parse peak GPU-buffer bandwidth from osu_bw output
  ansible.builtin.shell: >
    awk '/^[0-9]/ {bw=$2} END {print bw}'
    {{ validate_evidence_dir }}/t1_osu_bw.txt
  register: t1_peak_bw
  changed_when: false

- name: Check bandwidth regression against baseline
  when: validate_baseline_file != ""
  block:
    - name: Read baseline bandwidth
      ansible.builtin.set_fact:
        t1_baseline_bw: >-
          {{ (lookup('file', validate_baseline_file) | from_yaml).results.t1_gpu_mpi.metrics.osu_bw_peak_mbs }}

    - name: Assert no bandwidth regression
      ansible.builtin.assert:
        that:
          - (t1_peak_bw.stdout | float) >= (t1_baseline_bw | float) * (1 - osu_bw_regression_threshold_pct / 100.0)
        fail_msg: >
          T1 OSU BW regression: {{ t1_peak_bw.stdout }} MB/s vs baseline {{ t1_baseline_bw }} MB/s
          (threshold: {{ osu_bw_regression_threshold_pct }}%)
      when: validate_fail_on_regression
