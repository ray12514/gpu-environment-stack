---
# ML smoke test: LLaMA-1B distributed training, 50 steps, reports tokens/sec.

- name: Template ML smoke PBS job script
  ansible.builtin.template:
    src: ml_smoke_job.sh.j2
    dest: "{{ validate_evidence_dir }}/ml_smoke_job.sh"
    mode: "0755"

- name: Submit ML smoke job
  ansible.builtin.command:
    cmd: >
      qsub -W block=true
           -l select={{ validate_node_count }}:ncpus={{ cpus_per_node }}:ngpus={{ gpus_per_node }}
           -q {{ pbs_queue }}
           {{ validate_evidence_dir }}/ml_smoke_job.sh
  register: ml_submit
  failed_when: ml_submit.rc != 0

- name: Read tokens/sec result
  ansible.builtin.slurp:
    src: "{{ validate_evidence_dir }}/ml_tokens_per_sec.txt"
  register: ml_result_raw

- name: Check ML regression against baseline
  when: validate_baseline_file != "" and validate_fail_on_regression
  ansible.builtin.assert:
    that:
      - >
        (ml_result_raw.content | b64decode | trim | float)
        >= (lookup('file', validate_baseline_file) | from_yaml).results.ml_smoke.metrics.tokens_per_sec
           * (1 - ml_regression_threshold_pct / 100.0)
    fail_msg: >
      ML smoke regression — check {{ validate_evidence_dir }}/ml_smoke.txt
