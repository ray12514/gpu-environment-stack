---
# roles/spack_install/tasks/main.yml
# Check for an existing Spack installation; clone from GitHub if absent.

- name: Check if Spack is already installed
  ansible.builtin.stat:
    path: "{{ spack_root }}/bin/spack"
  register: spack_bin

- name: "Spack {{ spack_version }} is already installed — skipping clone"
  ansible.builtin.debug:
    msg: "Found Spack at {{ spack_root }}/bin/spack"
  when: spack_bin.stat.exists

- name: "Install Spack {{ spack_version }}"
  when: not spack_bin.stat.exists
  block:
    - name: Validate spack_version is a release tag
      ansible.builtin.assert:
        that:
          - spack_version is match('^v[0-9]+\.[0-9]+')
        fail_msg: >
          spack_version must be a release tag (e.g. v0.22.0), got '{{ spack_version }}'.
          Using 'develop' or an arbitrary branch is not supported for site installs.

    - name: Create Spack parent directory
      ansible.builtin.file:
        path: "{{ site_stack_root }}/spack"
        state: directory
        mode: "0755"

    - name: Clone Spack from GitHub
      ansible.builtin.git:
        repo: "{{ spack_github_url }}"
        dest: "{{ spack_root }}"
        version: "{{ spack_version }}"
        depth: 1

    - name: Set Spack directory permissions (world-readable)
      ansible.builtin.file:
        path: "{{ spack_root }}"
        state: directory
        mode: "0755"
        recurse: true

    - name: Confirm spack binary is available
      ansible.builtin.stat:
        path: "{{ spack_root }}/bin/spack"
      register: spack_bin_check
      failed_when: not spack_bin_check.stat.exists
