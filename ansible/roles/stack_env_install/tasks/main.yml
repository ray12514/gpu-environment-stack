---
# roles/stack_env_install/tasks/main.yml
# Configure Spack, detect system externals, build the environment, generate modules.

- name: Detect CPE external versions (detect-externals.sh)
  ansible.builtin.command:
    cmd: "{{ repo_root }}/scripts/detect-externals.sh"
  environment:
    REPO_ROOT: "{{ repo_root }}"
  register: detect_externals_result
  changed_when: true
  failed_when: detect_externals_result.rc != 0

- name: Show detect-externals output
  ansible.builtin.debug:
    msg: "{{ detect_externals_result.stdout_lines }}"

- name: Discover OS system library externals (spack external find)
  ansible.builtin.shell: |
    source {{ spack_root }}/share/spack/setup-env.sh
    spack external find --scope site openssl cmake m4 git perl pkgconf zlib tar diffutils
  args:
    executable: /bin/bash
  environment:
    SPACK_USER_CONFIG_PATH: "{{ repo_root }}/spack/classes/base"
  register: external_find_result
  changed_when: true

- name: Discover compilers (spack compiler find with PrgEnv-amd)
  ansible.builtin.shell: |
    source {{ spack_root }}/share/spack/setup-env.sh
    module load PrgEnv-amd
    spack compiler find --scope site
  args:
    executable: /bin/bash
  register: compiler_find_result
  changed_when: true

- name: Show compiler discovery output
  ansible.builtin.debug:
    msg: "{{ compiler_find_result.stdout_lines }}"

- name: Create Spack environment for {{ spack_env_name }}
  ansible.builtin.shell: |
    source {{ spack_root }}/share/spack/setup-env.sh
    if spack env list | grep -q "{{ spack_env_name }}"; then
      echo "Environment {{ spack_env_name }} already exists — skipping create"
    else
      spack env create {{ spack_env_name }} {{ spack_env_path }}/spack.yaml
    fi
  args:
    executable: /bin/bash
  register: env_create_result
  changed_when: "'already exists' not in env_create_result.stdout"

- name: Concretize the Spack environment
  ansible.builtin.shell: |
    source {{ spack_root }}/share/spack/setup-env.sh
    spack -e {{ spack_env_name }} concretize {{ spack_concretize_flags }}
  args:
    executable: /bin/bash
  register: concretize_result
  changed_when: true
  # Concretize can take several minutes for large environments
  async: 600
  poll: 30

- name: Build the Spack environment
  ansible.builtin.shell: |
    source {{ spack_root }}/share/spack/setup-env.sh
    spack -e {{ spack_env_name }} install {{ spack_install_flags }}
  args:
    executable: /bin/bash
  register: install_result
  changed_when: true
  # Full build can take several hours
  async: 21600
  poll: 60

- name: Generate Lmod module tree
  ansible.builtin.shell: |
    source {{ spack_root }}/share/spack/setup-env.sh
    spack -e {{ spack_env_name }} module lmod refresh --delete-tree -y
  args:
    executable: /bin/bash
  register: module_refresh_result
  changed_when: true

- name: Confirm module tree exists
  ansible.builtin.stat:
    path: "{{ site_stack_root }}/modules/lmod"
  register: module_tree
  failed_when: not module_tree.stat.exists
