---
# roles/stack_wrappers/tasks/main.yml
# Deploy wrapper scripts and front-door Lmod module to SITE_STACK_ROOT.

- name: Create wrappers/bin directory
  ansible.builtin.file:
    path: "{{ site_stack_root }}/wrappers/bin"
    state: directory
    mode: "0755"

- name: Create wrappers/libexec directory
  ansible.builtin.file:
    path: "{{ site_stack_root }}/wrappers/libexec"
    state: directory
    mode: "0755"

- name: Deploy wrapper scripts to SITE_STACK_ROOT/wrappers/bin
  ansible.builtin.copy:
    src: "{{ repo_root }}/wrappers/bin/"
    dest: "{{ site_stack_root }}/wrappers/bin/"
    mode: "0755"
    directory_mode: "0755"

- name: Deploy libexec scripts (benchmark_ddp.py, etc.)
  ansible.builtin.copy:
    src: "{{ repo_root }}/wrappers/libexec/"
    dest: "{{ site_stack_root }}/wrappers/libexec/"
    mode: "0755"
    directory_mode: "0755"

- name: Create front-door module directory
  ansible.builtin.file:
    path: "{{ site_stack_root }}/modulefiles/gpu-stack/{{ platform_class }}"
    state: directory
    mode: "0755"

- name: Deploy front-door Lmod module (with path tokens resolved)
  ansible.builtin.template:
    src: "{{ repo_root }}/modules/gpu-stack/{{ platform_class }}/{{ release }}.lua"
    dest: "{{ site_stack_root }}/modulefiles/gpu-stack/{{ platform_class }}/{{ release }}.lua"
    mode: "0644"
  vars:
    # Template substitution: replace <SITE_STACK_ROOT> and <SPACK_VERSION> tokens
    # The .lua file uses these literal strings as placeholders;
    # Ansible template engine replaces Jinja2 {{ }} syntax, so we use a copy+replace approach.

- name: Resolve SITE_STACK_ROOT token in front-door module
  ansible.builtin.replace:
    path: "{{ site_stack_root }}/modulefiles/gpu-stack/{{ platform_class }}/{{ release }}.lua"
    regexp: '<SITE_STACK_ROOT>'
    replace: "{{ site_stack_root }}"

- name: Resolve SPACK_VERSION token in front-door module
  ansible.builtin.replace:
    path: "{{ site_stack_root }}/modulefiles/gpu-stack/{{ platform_class }}/{{ release }}.lua"
    regexp: '<SPACK_VERSION>'
    replace: "{{ spack_version }}"

- name: Verify front-door module was deployed
  ansible.builtin.stat:
    path: "{{ site_stack_root }}/modulefiles/gpu-stack/{{ platform_class }}/{{ release }}.lua"
  register: front_door_stat
  failed_when: not front_door_stat.stat.exists
