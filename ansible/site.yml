---
# ansible/site.yml
# Subsequent deployment playbook. Skips spack_install (assumes Spack present).
# Use this for patch releases, re-deployments, and validation runs.
#
# Usage:
#   ansible-playbook -i ansible/inventory/lodger ansible/site.yml
#   ansible-playbook -i ansible/inventory/lodger ansible/site.yml --tags stack_validate

- name: Deploy gpu-stack release {{ release }} on {{ inventory_hostname }}
  hosts: all
  gather_facts: true

  roles:
    - role: stack_env_install
      tags: [stack_env_install]

    - role: stack_wrappers
      tags: [stack_wrappers]

    - role: stack_validate
      tags: [stack_validate]
