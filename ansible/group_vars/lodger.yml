---
# ansible/group_vars/lodger.yml
# System-specific variables for lodger (cray-amd / MI250X / PBS).

# Platform classification
platform_class: "cray-amd"
gpu_vendor: "amd"
amdgpu_target: "gfx90a"   # MI250X

# Hardware layout
gpus_per_node: 8           # MI250X nodes have 8 GCDs (4 physical dies × 2 GCDs each)
cpus_per_node: 64          # EPYC Milan; adjust if different

# Scheduler
scheduler: "pbs"
pbs_queue: "gpu"           # PBS queue name for GPU jobs; verify with: qstat -Q
mpi_launcher: "mpirun"     # cray-pals launcher

# Validation node count for T1 OSU and ML smoke tests
validate_node_count: 2

# Module system
module_system: "lmod"

# Front-door module name as it appears to users
front_door_module: "gpu-stack/cray-amd/{{ release }}"
